name: Deploy Storybook

on:
  workflow_run:
    workflows: ['CI']
    types:
      - completed

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: |
      github.event.workflow_run.conclusion == 'success' && 
      github.event.workflow_run.event != 'pull_request' &&
      (github.event.workflow_run.head_branch == 'main' || (startsWith(github.event.workflow_run.head_branch, 'v') && endsWith(github.event.workflow_run.head_branch, '.x')))

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci --ignore-scripts

      - name: Determine Target Directory
        id: target_dir
        env:
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
        run: |
          if [ "$HEAD_BRANCH" = "main" ]; then
            echo "dir=latest" >> $GITHUB_OUTPUT
          else
            echo "dir=$HEAD_BRANCH" >> $GITHUB_OUTPUT
          fi

      - name: Build Storybook
        run: VITE_APP_BASE_URL=/${{ steps.target_dir.outputs.dir }}/ npx storybook build -o dist-storybook

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist-storybook
          destination_dir: ${{ steps.target_dir.outputs.dir }}
          keep_files: true
