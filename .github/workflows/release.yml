name: Release

on:
  workflow_run:
    workflows: ['CI']
    types:
      - completed

jobs:
  release:
    runs-on: ubuntu-latest
    if: |
      github.event.workflow_run.conclusion == 'success' && 
      github.event.workflow_run.event != 'pull_request'  &&
      (github.event.workflow_run.head_branch == 'main' || (startsWith(github.event.workflow_run.head_branch, 'v') && endsWith(github.event.workflow_run.head_branch, '.x')))

    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write
      packages: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci --ignore-scripts
      - run: npm run build

      - name: Run Semantic Release
        id: semantic_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release

      - name: Create Branch on Major Release
        if: ${{ github.event.workflow_run.head_branch == 'main' }}
        run: |
          git fetch --tags
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "none")
          echo "Latest release tag detected: $LATEST_TAG"

          if [[ "$LATEST_TAG" =~ ^v([0-9]+)\.0\.0$ ]]; then
            MAJOR_VERSION="${BASH_REMATCH[1]}"
            BRANCH_NAME="v${MAJOR_VERSION}.x"
            
            if git ls-remote --heads origin "$BRANCH_NAME" | grep -q "$BRANCH_NAME"; then
              echo "Branch $BRANCH_NAME already exists."
            else
              git checkout -b "$BRANCH_NAME" "$LATEST_TAG"
              git push origin "$BRANCH_NAME"
              echo "Successfully initialized maintenance branch: $BRANCH_NAME"
            fi
          fi

      - name: Discard local package changes
        run: git checkout -- package.json package-lock.json

      - name: Sync Main Changes into Maintenance Branches
        if: ${{ github.event.workflow_run.head_branch == 'main' }}
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          MAINTENANCE_BRANCHES=$(git branch -r | grep -E 'origin/v[0-9]+\.x' | sed 's/^[[:space:]]*origin\///')

          for branch in $MAINTENANCE_BRANCHES; do
            echo "Processing sync for maintenance track: $branch"
            
            git checkout "$branch"
            git pull origin "$branch"
            
            if git merge origin/main --no-edit; then
              git push origin "$branch"
              echo "Successfully synced main updates into $branch"
            else
              echo "WARNING: Merge conflict detected while applying main updates to $branch!"
              echo "Aborting merge. This must be resolved manually via a backport PR."
              git merge --abort
            fi
          done
